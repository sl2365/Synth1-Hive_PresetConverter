===========================
; Synth1 Parameter ID Table
===========================

Baseline:
; Built from controlled one-parameter patch saves
; Patch format version seen: ver=1.1.3b3
; ID ## = The preset file number used to identify the parameter.
;  The list below is written as: ID = ParameterName [Preset File Value = Type of Parameter / GUI Value , Next Parameter, Next...]
; Parameters with values stated as 0-127, means there are 128 options of the setting. Zero is an option setting.
; Parameters stated as [0-127(##), -##/0/+##] are Bipolar, ie have positive and negative values with a central, unbiased setting. The number in parenthesis is the centre value.
; Parameters stated as simply 0-127 are Unipolar.
; Switch = Binary On/Off switch. Button = multiple options available, as in various waves for an oscillator.
; ** = gui shows same value as in the preset file.
; *** = Not every step is accounted for, ie: +/-1%, +/-4%, +/-7%, etc... arent accessible in the gui due to there being only 128 values in the preset file. Same for other parameters using musical/msec timing, etc... But as these are just levels, I dont see this as a concern, just estimate the closest you can.
; Patch rename only changes the first line (patch name), not parameter IDs. When converting, follow these rules:
 Remove the word Synth1 from any file names.
 Remove any spaces from beginning and end of names.
 Capitalise new words, but make small words start in lower case.
 Keep the preset number and name and use both as Filename, like this:
	001 Brastring.h2p
	002 Piano.h2p
	003 E.Piano
	004 Honky Piano
	etc...


