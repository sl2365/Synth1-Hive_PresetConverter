Hive Parameter List - INIT Order
================================

Notes
-----
- Order follows New INIT.h2p exactly.
- Meanings are likely/working descriptions, not guaranteed confirmations.
- This is intended as a locator/reference sheet for the current Hive preset format.
- Repeated sections are kept in the same order as INIT.

[Header / metadata]
Author                = preset author metadata
Description           = preset description metadata
Usage                 = preset usage metadata
Categories            = preset category metadata
Features              = preset feature metadata
Character             = preset character metadata

#AM                   = synth / format identifier
#Vers                 = preset format version
#Endian               = endian metadata
#nm                   = metadata/mod source count or related global count

#ms                   = modulation source list entry
#nv                   = number of modulation via entries or related count
#mv                   = modulation-via list entry

[main]
CcOp                  = main control option / UI opacity / macro display amount

[PCore]
SBase                 = sequencer/song base setting
Swing                 = global swing amount
STrig                 = sequencer trigger mode
PFold                 = pattern fold / UI fold state
PFile                 = pattern file index/reference
Rev                   = internal revision/build marker
LED                   = UI LED state/intensity
MidiA                 = MIDI assignment/global MIDI setting A
MidiP                 = MIDI assignment/global MIDI setting P

[XY]
X_1                   = XY pad 1 X position
X1Lbl                 = XY pad 1 X label/index
Y_1                   = XY pad 1 Y position
Y1Lbl                 = XY pad 1 Y label/index
