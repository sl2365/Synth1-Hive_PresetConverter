ID 62  = EQ level 		[EQ.HighG + EQ.MidG + EQ.BassG]
ID 63  = EQ Q 			[None]
ID 90  = pan L/R 		[Osc1.Pan + Osc2.Pan]

[Chorus]
ID 66  = chorus/flanger on/off switch 	[None] Could use Chorus.Wet = 0 if the S1 Chorus is Off.
ID 64  = chorus/flanger type selector 	[Chorus.Type]
