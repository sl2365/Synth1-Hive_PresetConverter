ID 55  = chorus/flanger feedback 		[None]
ID 56  = chorus/flanger level 			[Chorus.Wet]

[FX]
ID 77  = FX on/off switch 	[FX On/Off] Essentially, there are three FX: Distortion, Compressor, Phaser. Just set their switch depending on the Synth1 state. 
ID 78  = FX type selector 	[FX On/Off] Depending on which Synth1 FX is selected, then enable that FX in Hive while disabling the other two. Essentially, there are three FX: Distortion, Compressor, Phaser. This needs to work in conjunction with the above ID77 though. So if ID77 is Off, then all three FX are Off. If ID77 is On, then only the value of ID77 should be the active FX.
ID 79  = FX control 1 		[Distort.Amount / Phaser.Rate] LOW / APPROX ; type-dependent.
ID 80  = FX control 2 		[Distort.Tone / Phaser.FB] LOW / APPROX ; type-dependent.
ID 81  = FX level 			[Distort.Mix / Phaser.Wet / Comp.Amount] Distort.Mix and Phaser.Wet should not use the full range for the Hive conversion. ie, they should use a ratio of Synth1:0-127 = Hive:0-50.

