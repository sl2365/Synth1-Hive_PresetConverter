====================
; LFO Destinations:
====================
; Each ModMatrix has two Dest slots and some may be required for the correct conversion of LFO destination functionality.
; Items marked ** are not possible to convert so just ignore those.
Osc2 Pitch = (MM1.Dest1 = Osc2:Tune)
Osc1+2 Pitch = (MM1.Dest1 = Osc1:Tune) + (MM1.Dest2 = Osc2:Tune)
Filter Cutoff = (MM1.Dest1 = Filter1:Cutoff)
Amp Level = (MM1.Dest1 = Osc1.Volume) + (MM1.Dest2 = Osc2.Volume)
Osc2 PulseWidth = (MM1.Dest1 = Osc1.Volume)
FM = (MM1.Dest1 = LFO1.Phase) + (MM1.Dest2 = LFO2.Phase)
Pan = (MM1.Dest1 = Osc1.Pan) + (MM1.Dest2 = Osc2.Pan)

