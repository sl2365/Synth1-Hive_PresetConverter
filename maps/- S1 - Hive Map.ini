ID 88  = midi source 2 		[MM6.Source]
ID 89  = midi dest 2 		[MM6.Dest1] MM6.Dest2 optional

===========================
; Synth1 MIDI Destinations:
===========================
; This is the key to the list below, (Depth2 | Dest2) are optional depending on how it would be implemented in Hive. Some of these require two dests to work, for example, Pan requires both as there is no global Pan in Hive:
 Dest1=Osc1:Pan
 Dest2=Osc2:Pan

; Synth1 Preset Raw value = GUI Parameter Name [MM5/MM6 Source | (ID 50: Depth1=Value | Dest1) | (ID 51: Depth2=Value | Dest2)]
; Items marked with ** are not possible to convert, so are cannot be modulated, just ignore those.
; This list is equal for both Synth1 Src1 / Src2 and Hive MM5 / MM6 so can be applied to either one in the same way.
; If 2 destinations are required to emulate one Synth1 Destination, then the Depth1 and Depth2 should be set to the same value.

