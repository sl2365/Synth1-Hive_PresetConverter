=============================
Synth1 to Hive Likely Mapping
=============================

Baseline:
; Built by comparing latest Synth1 parameter map with Hive AdvancedSave parameter map.
; Format:
; ID ## = Synth1 ParameterName [Hive Parameter(s)] Confidence / MappingType ; Notes

[Notes]
; IMPORTANT - CHECK THAT THERE ARE NO DUPLICATES, ie, Not parameters have been used in two places as this will likely cause conflict.
; [None] items currently have no clear target in the Hive AdvancedSave map and should be ignored.

- Phaser/Chorus/Distortion/Delay: The Mix/Wet Level should only go from Dry to Mid way due to the way synth1 works, it simply has a level knob for these FX, not an actual Wet/Dry knob.
- The AnalDist, DigiDist, Deci, Ring, Comp, Phaser FX are only allowed to be active one at a time in Synth1, whereas Hive allows all to be active at once. So this needs to be taken into account when converting.
- Synth1 Phaser conversion settings: Phaser1+Phaser2 use Stoned setting in Hive. Phaser3+Phaser4 use Flanged setting in Hive.

